name: Firmware Build and Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      firmware_version: ${{ steps.version.outputs.firmware_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect firmware version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          firmware_version=$(grep -oE 'FIRMWARE_VERSION[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' vmix_tally_esp32/vmix_tally_esp32.ino | head -n 1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)"/\1/')

          if [ -z "$firmware_version" ]; then
            echo "Unable to find FIRMWARE_VERSION in vmix_tally_esp32.ino" >&2
            exit 1
          fi

          latest_tag=$(git tag -l 'v*' --sort=-version:refname | head -n 1)
          should_release=false

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            should_release=false
          elif [ -z "$latest_tag" ]; then
            should_release=true
          else
            latest_version=${latest_tag#v}
            highest_version=$(printf '%s\n%s\n' "$latest_version" "$firmware_version" | sort -V | tail -n 1)

            if [ "$highest_version" = "$firmware_version" ] && [ "$firmware_version" != "$latest_version" ]; then
              should_release=true
            fi
          fi

          echo "firmware_version=$firmware_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$firmware_version" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board_name: esp32
            fqbn: esp32:esp32:esp32
            artifact_prefix: vtally-32-esp32
            extra_build_args: ""
          - board_name: esp32s3
            fqbn: esp32:esp32:esp32s3
            artifact_prefix: vtally-32-esp32s3
            extra_build_args: "--build-property build.cdc_on_boot=1 --build-property build.usb_mode=1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Restore Arduino cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: ${{ runner.os }}-arduino-${{ matrix.board_name }}-${{ hashFiles('**/*.ino', '**/*.h', '**/*.cpp', '**/*.hpp') }}
          restore-keys: |
            ${{ runner.os }}-arduino-${{ matrix.board_name }}-
            ${{ runner.os }}-arduino-

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Adafruit NeoPixel"

      - name: Compile firmware
        run: |
          mkdir -p dist/${{ matrix.board_name }}
          arduino-cli compile \
            --fqbn ${{ matrix.fqbn }} \
            ${{ matrix.extra_build_args }} \
            --output-dir dist/${{ matrix.board_name }} \
            vmix_tally_esp32

      - name: Rename firmware binaries
        shell: bash
        run: |
          set -euo pipefail
          cd dist/${{ matrix.board_name }}
          for file in *.bin; do
            case "$file" in
              vmix_tally_esp32.ino.bin)
                target="${{ matrix.artifact_prefix }}-ota.bin"
                ;;
              vmix_tally_esp32.ino.bootloader.bin)
                target="${{ matrix.artifact_prefix }}-bootloader.bin"
                ;;
              vmix_tally_esp32.ino.partitions.bin)
                target="${{ matrix.artifact_prefix }}-partitions.bin"
                ;;
              *)
                suffix="${file#vmix_tally_esp32.ino.}"
                target="${{ matrix.artifact_prefix }}-${suffix}"
                ;;
            esac
            mv "$file" "$target"
          done

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-bin
          path: dist/${{ matrix.board_name }}/*.bin
          if-no-files-found: error

  release:
    if: needs.version.outputs.should_release == 'true' && github.event_name != 'pull_request'
    needs:
      - version
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download ESP32 artifacts
        uses: actions/download-artifact@v4
        with:
          name: vtally-32-esp32-bin
          path: release-assets/esp32

      - name: Download ESP32-S3 artifacts
        uses: actions/download-artifact@v4
        with:
          name: vtally-32-esp32s3-bin
          path: release-assets/esp32s3

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          name: VTally-32 v${{ needs.version.outputs.firmware_version }}
          generate_release_notes: true
          files: |
            release-assets/esp32/*.bin
            release-assets/esp32s3/*.bin
